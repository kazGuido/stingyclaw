services:
  voice:
    image: stingyclaw-voice
    build:
      context: ./container/voice-service
    container_name: stingyclaw-voice
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      # Hugging Face cache for NeuTTS Air + Neucodec (persists across rebuilds)
      - voice-models:/models
    environment:
      - HF_HOME=/models
      - TTS_SPEED=1.02
    # Ensure voice has enough RAM when agent container is also running
    mem_limit: 3g

volumes:
  voice-models:
